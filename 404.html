<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    if (!window.location.pathname.endsWith('/')) {
      window.location.href = window.location.href + '/';
    }
  </script>
</head>
<body>
  <p>Redirecting to correct URL...</p>
</body>
</html>
